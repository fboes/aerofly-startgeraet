on:
  workflow_call: # Called via release.yml

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build GUI application
        run: |
          mkdir -p ./artifact/gui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-artifact-${{ matrix.suffix }}
          path: ./artifact/gui
