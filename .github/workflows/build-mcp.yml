on:
  workflow_call: # Called via release.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build MCP server
        run: |
          npm run build:mcp

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-artifact
          path: ./artifact/mcp
