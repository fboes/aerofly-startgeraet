on:
  workflow_call: # Called via release.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build MCP server as MCPB file
        run: |
          npm run build:mcp

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-artifact
          path: ./artifacts/mcp
